# Nowhere Data Pipeline - Docker Compose 설계 초안
#
# 목적: 현재 OCI vm-03(Oracle Linux 8) 위에 수동으로 구축한 파이프라인
#      (PostgreSQL+PostGIS / Streamlit / cron / nginx)을, 향후 실사용자
#      환경으로 이전할 때를 대비한 "이식성 확보를 위한 컨테이너화 설계".
#
# 주의: 이 파일은 설계 수준 산출물이며 실제 동작 검증(docker compose up)은
#      수행하지 않았습니다. vm-03 실배포는 지금까지와 동일하게 호스트에
#      직접 설치된 PostgreSQL/nginx로 계속 운영됩니다.
#
# Oracle Linux 8 + SELinux(Enforcing) 환경을 고려한 설계 포인트:
#   - 모든 바인드 마운트 볼륨에 :z 플래그 적용 (SELinux 컨텍스트 재라벨링)
#   - 컨테이너 postgres 포트는 호스트의 기존 PostgreSQL(5432)과 충돌하지
#     않도록 5433으로 매핑

services:
  postgres:
    image: postgis/postgis:16-3.3
    container_name: nowhere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crowd_pipeline
      POSTGRES_USER: crowd_app
      POSTGRES_PASSWORD: ${CROWD_APP_PW}
    ports:
      - "5433:5432"   # 호스트 5432(기존 PostgreSQL)와 충돌 방지
    volumes:
      - pgdata:/var/lib/postgresql/data:z
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/schema.sql:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crowd_app -d crowd_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nowhere-net

  streamlit:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: nowhere-streamlit
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432   # 컨테이너 네트워크 내부 통신은 postgres의 기본 포트 그대로 사용
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nowhere-net
    # 외부 노출 없음 - nginx를 통해서만 접근 (vm-03 실배포와 동일한 구조)

  cron:
    build:
      context: .
      dockerfile: scripts/Dockerfile.cron
    container_name: nowhere-weather-cron
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nowhere-net

  nginx:
    image: nginx:1.25-alpine
    container_name: nowhere-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
    depends_on:
      - streamlit
    networks:
      - nowhere-net

networks:
  nowhere-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
