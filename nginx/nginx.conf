# Nowhere Data Pipeline - nginx 리버스 프록시 설정 (Docker 컨테이너용)
# 설계 수준 초안. vm-03 실배포에서는 /etc/nginx/nginx.conf의 기본 서버 블록을
# 직접 수정해서 동일한 역할(80 -> streamlit:8501)을 하고 있음.

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location / {
            # Docker 네트워크 내부에서는 컨테이너 서비스명으로 접근 (localhost 아님)
            proxy_pass http://streamlit:8501;

            # Streamlit은 WebSocket 기반이라 업그레이드 헤더 필수
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }
    }
}
